<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bricks Ano Tara?</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="nav">
  <h1>🧱 Bricks Ano Tara?</h1>
  <div>
    <button onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>LIMITED BRICK DROP</h2>
    <p>Collect. Display. Flex.</p>
    <button onclick="scrollToProducts()">Shop Now</button>
  </div>
</section>

<section class="products" id="product-list"></section>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: ₱<span id="total">0</span></h3>
  <button type="button" onclick="openCheckout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
  <div class="checkout-box">
    <h2>Secure Checkout</h2>

    <input placeholder="Full Name">
    <input placeholder="Address">
    <input placeholder="Phone">

    <select>
      <option>GCash</option>
      <option>PayPal</option>
    </select>

    <button onclick="placeOrder()">Pay Now</button>
    <button onclick="closeCheckout()">Cancel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
